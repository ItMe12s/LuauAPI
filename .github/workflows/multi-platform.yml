name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  host-tests:
    name: Host Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup sccache (Windows)
        if: runner.os == 'Windows'
        uses: Mozilla-Actions/sccache-action@v0.0.10

      - name: Setup ccache (macOS/Linux)
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: host-tests-${{ matrix.os }}

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-host-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt','cmake/*.cmake') }}
          restore-keys: |
            deps-host-${{ matrix.os }}-

      - name: Configure
        run: >
          cmake -G Ninja -B build
          -DLUAUAPI_HOST_ONLY=ON -DLUAUAPI_BUILD_TESTS=ON
          -DCMAKE_C_COMPILER_LAUNCHER=${{ runner.os == 'Windows' && 'sccache' || 'ccache' }}
          -DCMAKE_CXX_COMPILER_LAUNCHER=${{ runner.os == 'Windows' && 'sccache' || 'ccache' }}

      - name: Build tests
        run: cmake --build build --config Debug --target luauapi_tests --parallel
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: ${{ runner.os == 'macOS' && '3' || '2' }}

      - name: Run tests
        run: ctest --test-dir build -C Debug --output-on-failure

  linux-codegen-tests:
    name: Linux Codegen Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Run Python codegen tests
        run: python -m unittest discover -s tests/luau_codegen -p "test_*.py"
        env:
          PYTHONPATH: tools

  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest

        - name: macOS
          os: macos-latest

        - name: iOS
          os: macos-latest
          target: iOS

        - name: Android32
          os: ubuntu-latest
          target: Android32

        - name: Android64
          os: ubuntu-latest
          target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-build-${{ matrix.config.name }}-${{ hashFiles('CMakeLists.txt','cmake/*.cmake') }}
          restore-keys: |
            deps-build-${{ matrix.config.name }}-

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}
          ccache-variant: ${{ (runner.os == 'Windows' || runner.os == 'Linux') && 'sccache' || 'ccache' }}

      - name: Summarize LuauAPI codegen
        shell: pwsh
        run: |
          $reports = Get-ChildItem -Path . -Recurse -Filter report.md | Where-Object { $_.FullName -like '*luauapi-gen*' }
          if (-not $reports) {
            Write-Host "No LuauAPI codegen report found."
            exit 0
          }
          foreach ($report in $reports) {
            Write-Host "LuauAPI codegen report: $($report.FullName)"
            Get-Content $report.FullName | Select-Object -First 40
          }

      - name: Upload LuauAPI codegen reports
        uses: actions/upload-artifact@v4
        with:
          name: LuauAPI Codegen Reports ${{ matrix.config.name }}
          path: '**/luauapi-gen/report.md'
          if-no-files-found: ignore

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}
