name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  windows-tests:
    name: Windows Tests
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build tests
        uses: geode-sdk/build-geode-mod@main
        with:
          configure-args: -DLUAUAPI_BUILD_TESTS=ON
          build-args: --target luauapi_tests

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  macos-tests:
    name: macOS Tests
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build tests
        uses: geode-sdk/build-geode-mod@main
        with:
          configure-args: -DLUAUAPI_BUILD_TESTS=ON
          build-args: --target luauapi_tests

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  linux-codegen-tests:
    name: Linux Codegen Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python codegen tests
        run: python -m unittest discover -s tests/luau_codegen -p "test_*.py"
        env:
          PYTHONPATH: tools

  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest

        - name: macOS
          os: macos-latest

        - name: iOS
          os: macos-latest
          target: iOS

        - name: Android32
          os: ubuntu-latest
          target: Android32

        - name: Android64
          os: ubuntu-latest
          target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}

      - name: Summarize LuauAPI codegen
        shell: pwsh
        run: |
          $reports = Get-ChildItem -Path . -Recurse -Filter report.md | Where-Object { $_.FullName -like '*luauapi-gen*' }
          if (-not $reports) {
            Write-Host "No LuauAPI codegen report found."
            exit 0
          }
          foreach ($report in $reports) {
            Write-Host "LuauAPI codegen report: $($report.FullName)"
            Get-Content $report.FullName | Select-Object -First 40
          }

      - name: Upload LuauAPI codegen reports
        uses: actions/upload-artifact@v4
        with:
          name: LuauAPI Codegen Reports ${{ matrix.config.name }}
          path: '**/luauapi-gen/report.md'
          if-no-files-found: ignore

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}
